<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Job Time Trial - Mario Style</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background: #5C94FC; /* Mario Sky */
            font-family: 'Courier New', Courier, monospace;
            text-align: center;
        }
        #finish-line {
            position: absolute;
            top: 100px;
            width: 100%;
            height: 20px;
            background: repeating-linear-gradient(90deg, #fff, #fff 20px, #f00 20px, #f00 40px);
            border: 4px solid #000;
        }
        #timer-display {
            font-size: 50px;
            color: yellow;
            text-shadow: 4px 4px #000;
            margin-top: 20px;
        }
        .player-sprite {
            position: absolute;
            bottom: 120px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 120px;
            transition: bottom 0.1s ease-out;
            z-index: 10;
        }
        .grass {
            position: absolute;
            bottom: 0;
            width: 100%;
            height: 120px;
            background: #22B14C;
            border-top: 8px solid #005800;
        }
        #menu {
            position: fixed;
            top: 130px;
            width: 100%;
            background: rgba(255, 255, 255, 0.8);
            padding: 10px 0;
            z-index: 100;
        }
        .job-btn {
            padding: 10px;
            margin: 5px;
            font-size: 16px;
            cursor: pointer;
            background: white;
            border: 2px solid #333;
            border-radius: 5px;
        }
        .job-btn:hover { background: #ffff00; }
        #start-btn {
            padding: 20px 50px;
            font-size: 30px;
            background: #E74C3C;
            color: white;
            border: 5px solid white;
            border-radius: 15px;
            cursor: pointer;
            margin-top: 20px;
        }
    </style>
</head>
<body>

    <div id="timer-display">TIME: 0.00s</div>
    <div id="finish-line"></div>

    <div id="menu">
        <p><strong>CHOOSE A JOB:</strong></p>
        <button class="job-btn" onclick="setJob('🚒', 'Firefighter')">Firefighter</button>
        <button class="job-btn" onclick="setJob('🚓', 'Police Officer')">Police Officer</button>
        <button class="job-btn" onclick="setJob('⚾', 'Baseball Player')">Baseball Player</button>
        <button class="job-btn" onclick="setJob('🚐', 'Reporter')">Reporter</button>
        <button class="job-btn" onclick="setJob('🧪', 'Scientist')">Scientist</button>
        <button class="job-btn" onclick="setJob('🎤', 'Singer')">Singer</button>
        <button class="job-btn" onclick="setJob('📷', 'YouTuber')">YouTuber</button>
        <button class="job-btn" onclick="setJob('📏', 'Engineer')">Engineer</button>
        <br>
        <button id="start-btn" onclick="startTrial()">START!</button>
    </div>

    <div id="sprite" class="player-sprite">🚒</div>
    <div class="grass"></div>

<script>
    let currentHeight = 120;
    let racing = false;
    let startTime;
    let timerInterval;
    let currentJobName = "Firefighter";

    function setJob(emoji, name) {
        document.getElementById('sprite').innerText = emoji;
        currentJobName = name;
        resetGame();
    }

    async function startTrial() {
        document.getElementById('menu').style.display = 'none';
        
        const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
        const audioContext = new (window.AudioContext || window.webkitAudioContext)();
        const analyser = audioContext.createAnalyser();
        const source = audioContext.createMediaStreamSource(stream);
        source.connect(analyser);
        analyser.fftSize = 256;
        const dataArray = new Uint8Array(analyser.frequencyBinCount);

        racing = true;
        startTime = Date.now();

        timerInterval = setInterval(() => {
            let elapsed = (Date.now() - startTime) / 1000;
            document.getElementById('timer-display').innerText = `TIME: ${elapsed.toFixed(2)}s`;
        }, 10);

        function update() {
            if (!racing) return;
            analyser.getByteFrequencyData(dataArray);
            let volume = dataArray.reduce((a, b) => a + b) / dataArray.length;

            if (volume > 40) { 
                currentHeight += (volume / 12); // Adjust speed here
            }

            document.getElementById('sprite').style.bottom = currentHeight + 'px';

            const winLine = window.innerHeight - 150;
            if (currentHeight > winLine) {
                racing = false;
                clearInterval(timerInterval);
                let finalTime = document.getElementById('timer-display').innerText;
                alert(`GREAT JOB! \n${currentJobName} finished in ${finalTime}`);
                document.getElementById('menu').style.display = 'block';
                resetGame();
            }
            requestAnimationFrame(update);
        }
        update();
    }

    function resetGame() {
        currentHeight = 120;
        document.getElementById('sprite').style.bottom = '120px';
        document.getElementById('timer-display').innerText = "TIME: 0.00s";
    }
</script>
</body>
</html>
