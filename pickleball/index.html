<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pickleball Mini Game</title>
<style>
  body { text-align: center; font-family: 'Segoe UI', sans-serif; background: #2c3e50; color: white; margin: 0; overflow: hidden; }
  
  /* Intro & Game Over Screens */
  #intro, #game-over {
    position: absolute; top: 0; left: 0; width: 100%; height: 100%;
    background: rgba(44, 62, 80, 0.95); z-index: 10;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
  }
  
  .char-select { display: flex; gap: 20px; margin: 20px; }
  .char-box { 
    padding: 15px; border: 3px solid #fff; border-radius: 10px; cursor: pointer; 
    transition: 0.3s; background: #34495e; 
  }
  .char-box:hover { transform: scale(1.1); background: #3b5fe2; }
  .char-box.selected { border-color: #f1c40f; background: #3b5fe2; }
  .char-icon { font-size: 50px; display: block; }

  canvas { background: #6bbf59; border: 6px solid #ecf0f1; border-radius: 10px; cursor: grab; }
  canvas:active { cursor: grabbing; }
  
  .score { font-size: 32px; margin: 10px; font-weight: bold; color: #f1c40f; }
  button { padding: 12px 24px; font-size: 18px; cursor: pointer; border-radius: 8px; border: none; background: #e67e22; color: white; font-weight: bold; }
  
  .hidden { display: none !important; }
  .red-flash { animation: flash 0.3s; }
  @keyframes flash { 0% { background: #c0392b; } 100% { background: #6bbf59; } }
</style>
</head>
<body>

<div id="intro">
  <h1>🏓 Arcade Pickleball</h1>
  <p>First to 5 wins! Choose your players:</p>
  <div style="display:flex; gap: 50px;">
    <div>
      <h3>Player 1</h3>
      <div class="char-select">
        <div class="char-box selected" onclick="selectChar(1, '🦁')"><span class="char-icon">🦁</span></div>
        <div class="char-box" onclick="selectChar(1, '🤖')"><span class="char-icon">🤖</span></div>
      </div>
    </div>
    <div>
      <h3>Player 2</h3>
      <div class="char-select">
        <div class="char-box" onclick="selectChar(2, '🦊')"><span class="char-icon">🦊</span></div>
        <div class="char-box selected" onclick="selectChar(2, '👽')"><span class="char-icon">👽</span></div>
      </div>
    </div>
  </div>
  <button onclick="startGame()">START MATCH</button>
</div>

<div id="game-over" class="hidden">
  <h1 id="winner-text"></h1>
  <button onclick="restartGame()">PLAY AGAIN</button>
</div>

<div class="score">
  <span id="p1-name">🦁</span>: <span id="p1-score">0</span> 
  | 
  <span id="p2-name">👽</span>: <span id="p2-score">0</span>
</div>

<canvas id="game" width="800" height="400"></canvas>

<script>
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');

let gameRunning = false;
let ball = { x: 400, y: 200, dx: 5, dy: 3, radius: 10 };
let p1 = { x: 30, y: 160, w: 15, h: 80, char: '🦁' };
let p2 = { x: 755, y: 160, w: 15, h: 80, char: '👽' };
let p1Score = 0, p2Score = 0;

// SFX Engine
let audioCtx;
function playSfx(freq, type = 'square') {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  osc.connect(gain); gain.connect(audioCtx.destination);
  osc.frequency.value = freq; osc.type = type;
  osc.start();
  gain.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + 0.2);
  osc.stop(audioCtx.currentTime + 0.2);
}

function selectChar(player, icon) {
  if (player === 1) { p1.char = icon; document.getElementById('p1-name').textContent = icon; }
  else { p2.char = icon; document.getElementById('p2-name').textContent = icon; }
  playSound('click'); // (Assumes a generic sound function)
}

function startGame() {
  document.getElementById('intro').classList.add('hidden');
  gameRunning = true;
  p1Score = 0; p2Score = 0;
}

// Dragging Logic
let dragging = null;
canvas.addEventListener('mousedown', (e) => {
  const rect = canvas.getBoundingClientRect();
  const x = e.clientX - rect.left;
  const y = e.clientY - rect.top;
  if (x < 100) dragging = p1;
  if (x > 700) dragging = p2;
});

canvas.addEventListener('mousemove', (e) => {
  if (!dragging) return;
  const rect = canvas.getBoundingClientRect();
  dragging.y = (e.clientY - rect.top) - dragging.h / 2;
});

canvas.addEventListener('mouseup', () => dragging = null);

function drawBall() {
  ctx.beginPath();
  ctx.arc(ball.x, ball.y, ball.radius, 0, Math.PI*2);
  ctx.fillStyle = '#ccff00'; // Neon Pickleball
  ctx.shadowBlur = 10; ctx.shadowColor = '#ccff00';
  ctx.fill();
  ctx.shadowBlur = 0;
}

function update() {
  if (!gameRunning) return;
  ball.x += ball.dx; ball.y += ball.dy;

  if (ball.y < 10 || ball.y > canvas.height - 10) ball.dy *= -1;

  // Paddle collisions
  if (ball.x < p1.x + p1.w && ball.y > p1.y && ball.y < p1.y + p1.h) { ball.dx *= -1.1; playSfx(600); }
  if (ball.x > p2.x - ball.radius && ball.y > p2.y && ball.y < p2.y + p2.h) { ball.dx *= -1.1; playSfx(600); }

  // Scoring
  if (ball.x < 0) { p2Score++; resetBall(); triggerRedFlash(); }
  if (ball.x > canvas.width) { p1Score++; resetBall(); triggerRedFlash(); }

  document.getElementById('p1-score').textContent = p1Score;
  document.getElementById('p2-score').textContent = p2Score;

  if (p1Score >= 5 || p2Score >= 5) {
    gameRunning = false;
    document.getElementById('game-over').classList.remove('hidden');
    document.getElementById('winner-text').textContent = (p1Score >= 5 ? p1.char : p2.char) + " Wins! 🏆";
  }
}

function triggerRedFlash() {
  canvas.classList.add('red-flash');
  playSfx(150, 'sawtooth');
  setTimeout(() => canvas.classList.remove('red-flash'), 300);
}

function resetBall() {
  ball.x = 400; ball.y = 200; ball.dx = (Math.random() > 0.5 ? 5 : -5);
}

function restartGame() {
  location.reload();
}

function loop() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  // Simple court lines
  ctx.strokeStyle = "white"; ctx.strokeRect(10, 10, 780, 380);
  ctx.beginPath(); ctx.moveTo(400, 10); ctx.lineTo(400, 390); ctx.stroke();

  ctx.fillStyle = "blue"; ctx.fillRect(p1.x, p1.y, p1.w, p1.h);
  ctx.fillStyle = "red"; ctx.fillRect(p2.x, p2.y, p2.w, p2.h);
  
  drawBall();
  update();
  requestAnimationFrame(loop);
}
loop();
</script>
</body>
</html>
