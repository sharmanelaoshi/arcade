<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>World Pickleball Tournament</title>
<style>
  body { text-align: center; font-family: 'Segoe UI', sans-serif; background: #1a1a1a; color: white; margin: 0; overflow: hidden; }
  
  /* Tournament Overlays */
  #intro, #game-over, #serve-overlay {
    position: absolute; top: 0; left: 0; width: 100%; height: 100%;
    background: radial-gradient(circle, #2c3e50 0%, #000 100%); z-index: 10;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
  }
  
  .tournament-header { font-size: 50px; color: #f1c40f; text-shadow: 0 0 20px rgba(241, 196, 15, 0.5); margin: 0; }
  
  .char-grid { display: flex; gap: 15px; margin: 15px; }
  .char-box { 
    padding: 10px; border: 3px solid #444; border-radius: 12px; cursor: pointer; 
    transition: 0.2s; background: #333; opacity: 0.5;
  }
  .char-box.selected { border-color: #f1c40f; background: #3b5fe2; opacity: 1; box-shadow: 0 0 20px #f1c40f; }
  .char-icon { font-size: 45px; display: block; }

  canvas { 
    background: #2e7d32; border: 10px solid #ecf0f1; border-radius: 4px; 
    cursor: grab; box-shadow: 0 0 50px rgba(0,0,0,0.8);
  }
  
  .scoreboard { 
    background: #000; display: inline-block; padding: 10px 40px; 
    border-radius: 0 0 20px 20px; border: 2px solid #f1c40f;
    font-size: 36px; font-weight: bold; color: #f1c40f; 
  }
  
  button { 
    padding: 15px 40px; font-size: 22px; cursor: pointer; border-radius: 50px; 
    border: none; background: #f1c40f; color: #000; font-weight: bold; 
    text-transform: uppercase; letter-spacing: 2px;
  }
  button:hover { transform: scale(1.05); background: #fff; }
  
  .hidden { display: none !important; }
  .out-flash { animation: flashRed 0.3s; }
  @keyframes flashRed { 0% { background: #c0392b; } 100% { background: #2e7d32; } }
</style>
</head>
<body>

<div id="intro">
  <h1 class="tournament-header">🏆 WORLD PICKLEBALL TOURNAMENT</h1>
  <p style="color: #bdc3c7; letter-spacing: 3px;">CHAMPIONSHIP SERIES</p>
  
  <div style="display:flex; gap: 60px; margin-top: 20px;">
    <div>
      <h3 id="p1-label">ATHLETE 1: 🦁</h3>
      <div class="char-grid">
        <div class="char-box selected" onclick="selectChar(1, '🦁', this)"><span class="char-icon">🦁</span></div>
        <div class="char-box" onclick="selectChar(1, '🤖', this)"><span class="char-icon">🤖</span></div>
        <div class="char-box" onclick="selectChar(1, '🐯', this)"><span class="char-icon">🐯</span></div>
      </div>
    </div>
    <div>
      <h3 id="p2-label">ATHLETE 2: 👽</h3>
      <div class="char-grid">
        <div class="char-box" onclick="selectChar(2, '🦊', this)"><span class="char-icon">🦊</span></div>
        <div class="char-box selected" onclick="selectChar(2, '👽', this)"><span class="char-icon">👽</span></div>
        <div class="char-box" onclick="selectChar(2, '🐵', this)"><span class="char-icon">🐵</span></div>
      </div>
    </div>
  </div>
  <button onclick="startGame()" style="margin-top: 20px;">Enter Stadium</button>
</div>

<div id="serve-overlay" class="hidden">
  <h2 id="serve-text" style="font-size: 40px; color: #f1c40f;">READY?</h2>
  <button onclick="serveBall()">SERVE!</button>
</div>

<div id="game-over" class="hidden">
  <div style="font-size: 80px;">🏆</div>
  <h1 id="winner-text" style="font-size: 60px; color: #f1c40f;"></h1>
  <button onclick="location.reload()">New Tournament</button>
</div>

<div class="scoreboard">
  <span id="p1-display">🦁</span> <span id="p1-score">0</span> 
  <span style="color: #444; margin: 0 15px;">VS</span> 
  <span id="p2-score">0</span> <span id="p2-display">👽</span>
</div>

<br>
<canvas id="game" width="800" height="400"></canvas>

<script>
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');

let gameRunning = false;
let isWaitingForServe = false;
let ball = { x: 400, y: 200, dx: 0, dy: 0, radius: 10, baseSpeed: 4.5 };
let p1 = { x: 25, y: 160, w: 12, h: 80, char: '🦁' };
let p2 = { x: 763, y: 160, w: 12, h: 80, char: '👽' };
let p1Score = 0, p2Score = 0;

let audioCtx;
function playSound(freq, type = 'square', vol = 0.1) {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  const osc = audioCtx.createOscillator();
  const g = audioCtx.createGain();
  osc.connect(g); g.connect(audioCtx.destination);
  osc.frequency.value = freq; osc.type = type;
  g.gain.setValueAtTime(vol, audioCtx.currentTime);
  g.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + 0.1);
  osc.start(); osc.stop(audioCtx.currentTime + 0.1);
}

function selectChar(player, icon, element) {
  playSound(500, 'sine', 0.05);
  const boxes = element.parentElement.getElementsByClassName('char-box');
  for (let box of boxes) box.classList.remove('selected');
  element.classList.add('selected');
  if (player === 1) {
    p1.char = icon; document.getElementById('p1-label').textContent = "ATHLETE 1: " + icon;
    document.getElementById('p1-display').textContent = icon;
  } else {
    p2.char = icon; document.getElementById('p2-label').textContent = "ATHLETE 2: " + icon;
    document.getElementById('p2-display').textContent = icon;
  }
}

function startGame() {
  document.getElementById('intro').classList.add('hidden');
  prepareServe();
}

function prepareServe() {
  gameRunning = false;
  isWaitingForServe = true;
  document.getElementById('serve-overlay').classList.remove('hidden');
  document.getElementById('serve-text').textContent = (p1Score + p2Score === 0) ? "TOURNAMENT START" : "POINT OVER";
  ball.x = 400; ball.y = 200;
  ball.dx = 0; ball.dy = 0;
}

function serveBall() {
  document.getElementById('serve-overlay').classList.add('hidden');
  isWaitingForServe = false;
  gameRunning = true;
  // Reset to base speed so it's not too fast
  ball.dx = (p1Score >= p2Score ? -ball.baseSpeed : ball.baseSpeed);
  ball.dy = (Math.random() - 0.5) * 5;
  playSound(600, 'sine');
}

let dragging = null;
canvas.addEventListener('mousedown', (e) => {
  const rect = canvas.getBoundingClientRect();
  const x = e.clientX - rect.left;
  if (x < 200) dragging = p1;
  else if (x > 600) dragging = p2;
});
canvas.addEventListener('mousemove', (e) => {
  if (!dragging) return;
  const rect = canvas.getBoundingClientRect();
  dragging.y = (e.clientY - rect.top) - dragging.h / 2;
  if (dragging.y < 15) dragging.y = 15;
  if (dragging.y > canvas.height - dragging.h - 15) dragging.y = canvas.height - dragging.h - 15;
});
canvas.addEventListener('mouseup', () => dragging = null);

function drawCourt() {
  ctx.fillStyle = '#2e7d32'; ctx.fillRect(0, 0, canvas.width, canvas.height);
  ctx.strokeStyle = "white"; ctx.lineWidth = 4;
  ctx.strokeRect(15, 15, canvas.width - 30, canvas.height - 30);
  ctx.lineWidth = 2; ctx.strokeRect(canvas.width/2 - 90, 15, 180, canvas.height - 30);
  ctx.beginPath();
  ctx.moveTo(15, canvas.height/2); ctx.lineTo(canvas.width/2 - 90, canvas.height/2);
  ctx.moveTo(canvas.width/2 + 90, canvas.height/2); ctx.lineTo(canvas.width - 15, canvas.height/2);
  ctx.stroke();
  ctx.strokeStyle = "rgba(0,0,0,0.8)"; ctx.lineWidth = 6;
  ctx.beginPath(); ctx.moveTo(canvas.width/2, 10); ctx.lineTo(canvas.width/2, canvas.height - 10);
  ctx.stroke();
}

function drawBall() {
  ctx.beginPath(); ctx.arc(ball.x, ball.y, ball.radius, 0, Math.PI*2);
  ctx.fillStyle = '#ccff00'; ctx.shadowBlur = 15; ctx.shadowColor = '#ccff00';
  ctx.fill(); ctx.shadowBlur = 0;
}

function update() {
  if (!gameRunning) return;
  ball.x += ball.dx; ball.y += ball.dy;

  if (ball.y < 25 || ball.y > canvas.height - 25) {
    ball.dy *= -1; playSound(400, 'sine', 0.05);
  }

  if (ball.dx < 0 && ball.x < p1.x + p1.w && ball.y > p1.y && ball.y < p1.y + p1.h) {
    ball.dx = Math.abs(ball.dx) * 1.05; playSound(600);
  }
  if (ball.dx > 0 && ball.x > p2.x - ball.radius && ball.y > p2.y && ball.y < p2.y + p2.h) {
    ball.dx = -Math.abs(ball.dx) * 1.05; playSound(600);
  }

  if (ball.x < 0 || ball.x > canvas.width) {
    if (ball.x < 0) p2Score++; else p1Score++;
    playSound(100, 'sawtooth');
    canvas.classList.add('out-flash');
    setTimeout(() => canvas.classList.remove('out-flash'), 300);
    
    if (p1Score >= 5 || p2Score >= 5) {
      gameRunning = false;
      document.getElementById('game-over').classList.remove('hidden');
      document.getElementById('winner-text').innerHTML = (p1Score >= 5 ? p1.char : p2.char) + " IS THE CHAMPION!";
    } else {
      prepareServe();
    }
  }
  document.getElementById('p1-score').textContent = p1Score;
  document.getElementById('p2-score').textContent = p2Score;
}

function loop() {
  drawCourt();
  ctx.fillStyle = "#2980b9"; ctx.fillRect(p1.x, p1.y, p1.w, p1.h);
  ctx.fillStyle = "#c0392b"; ctx.fillRect(p2.x, p2.y, p2.w, p2.h);
  drawBall();
  update();
  requestAnimationFrame(loop);
}
loop();
</script>
</body>
</html>
