<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pickleball Mini Game</title>
<style>
  body { text-align: center; font-family: 'Segoe UI', sans-serif; background: #2c3e50; color: white; margin: 0; overflow: hidden; }
  
  #intro, #game-over {
    position: absolute; top: 0; left: 0; width: 100%; height: 100%;
    background: rgba(44, 62, 80, 0.98); z-index: 10;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
  }
  
  .char-grid { display: flex; gap: 15px; margin: 15px; }
  .char-box { 
    padding: 10px; border: 3px solid #7f8c8d; border-radius: 12px; cursor: pointer; 
    transition: 0.2s; background: #34495e; opacity: 0.6;
  }
  .char-box:hover { transform: scale(1.05); opacity: 1; }
  /* Visual feedback for selection */
  .char-box.selected { border-color: #f1c40f; background: #3b5fe2; opacity: 1; box-shadow: 0 0 15px #f1c40f; }
  .char-icon { font-size: 40px; display: block; }

  canvas { background: #4e9e3b; border: 8px solid #ecf0f1; border-radius: 4px; cursor: grab; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
  
  .score-board { font-size: 32px; margin: 10px; font-weight: bold; color: #f1c40f; text-shadow: 2px 2px #000; }
  button { padding: 15px 30px; font-size: 20px; cursor: pointer; border-radius: 5px; border: none; background: #27ae60; color: white; font-weight: bold; text-transform: uppercase; }
  
  .hidden { display: none !important; }
  .red-flash { animation: flash 0.3s; }
  @keyframes flash { 0% { background: #e74c3c; } 100% { background: #4e9e3b; } }
</style>
</head>
<body>

<div id="intro">
  <h1 style="font-size: 48px; margin-bottom: 0;">PRO PICKLEBALL</h1>
  <p style="color: #bdc3c7;">First to 5 points wins!</p>
  
  <div style="display:flex; gap: 60px; margin-top: 20px;">
    <div>
      <h3 id="p1-label">Player 1: 🦁</h3>
      <div class="char-grid" id="p1-select">
        <div class="char-box selected" onclick="selectChar(1, '🦁', this)"><span class="char-icon">🦁</span></div>
        <div class="char-box" onclick="selectChar(1, '🤖', this)"><span class="char-icon">🤖</span></div>
        <div class="char-box" onclick="selectChar(1, '🐯', this)"><span class="char-icon">🐯</span></div>
      </div>
    </div>
    <div>
      <h3 id="p2-label">Player 2: 👽</h3>
      <div class="char-grid" id="p2-select">
        <div class="char-box" onclick="selectChar(2, '🦊', this)"><span class="char-icon">🦊</span></div>
        <div class="char-box selected" onclick="selectChar(2, '👽', this)"><span class="char-icon">👽</span></div>
        <div class="char-box" onclick="selectChar(2, '🐵', this)"><span class="char-icon">🐵</span></div>
      </div>
    </div>
  </div>
  <button onclick="startGame()">Start Match</button>
</div>

<div id="game-over" class="hidden">
  <h1 id="winner-text" style="font-size: 50px;"></h1>
  <button onclick="location.reload()">New Match</button>
</div>

<div class="score-board">
  <span id="p1-display">🦁</span> <span id="p1-score">0</span> 
  — 
  <span id="p2-score">0</span> <span id="p2-display">👽</span>
</div>

<canvas id="game" width="800" height="400"></canvas>

<script>
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');

let gameRunning = false;
let ball = { x: 400, y: 200, dx: 4, dy: 3, radius: 10 };
let p1 = { x: 25, y: 160, w: 12, h: 80, char: '🦁' };
let p2 = { x: 763, y: 160, w: 12, h: 80, char: '👽' };
let p1Score = 0, p2Score = 0;

// SFX Engine
let audioCtx;
function playSfx(freq, type = 'square', vol = 0.1) {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  const osc = audioCtx.createOscillator();
  const g = audioCtx.createGain();
  osc.connect(g); g.connect(audioCtx.destination);
  osc.frequency.value = freq; osc.type = type;
  g.gain.setValueAtTime(vol, audioCtx.currentTime);
  g.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + 0.15);
  osc.start(); osc.stop(audioCtx.currentTime + 0.15);
}

// Fixed selection logic with visual feedback
function selectChar(player, icon, element) {
  playSfx(400, 'sine', 0.05);
  // Clear previous selection in this player's grid
  const grid = element.parentElement;
  const boxes = grid.getElementsByClassName('char-box');
  for (let box of boxes) box.classList.remove('selected');
  
  // Highlight new selection
  element.classList.add('selected');
  
  if (player === 1) {
    p1.char = icon;
    document.getElementById('p1-label').textContent = "Player 1: " + icon;
    document.getElementById('p1-display').textContent = icon;
  } else {
    p2.char = icon;
    document.getElementById('p2-label').textContent = "Player 2: " + icon;
    document.getElementById('p2-display').textContent = icon;
  }
}

function startGame() {
  playSfx(600, 'sine');
  document.getElementById('intro').classList.add('hidden');
  gameRunning = true;
}

// Dragging Logic
let dragging = null;
canvas.addEventListener('mousedown', (e) => {
  const rect = canvas.getBoundingClientRect();
  const x = e.clientX - rect.left;
  if (x < 200) dragging = p1;
  else if (x > 600) dragging = p2;
});
canvas.addEventListener('mousemove', (e) => {
  if (!dragging) return;
  const rect = canvas.getBoundingClientRect();
  dragging.y = (e.clientY - rect.top) - dragging.h / 2;
  if (dragging.y < 15) dragging.y = 15;
  if (dragging.y > canvas.height - dragging.h - 15) dragging.y = canvas.height - dragging.h - 15;
});
canvas.addEventListener('mouseup', () => dragging = null);

function drawCourt() {
  // Grass/Base
  ctx.fillStyle = '#4e9e3b';
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  // Boundary White Lines
  ctx.strokeStyle = "white";
  ctx.lineWidth = 4;
  ctx.strokeRect(15, 15, canvas.width - 30, canvas.height - 30);

  // THE KITCHEN (Non-Volley Zone) - 7ft equivalent
  ctx.lineWidth = 2;
  ctx.strokeRect(canvas.width/2 - 90, 15, 180, canvas.height - 30);

  // THE NET (Thick Black/White Line)
  ctx.strokeStyle = "#333";
  ctx.lineWidth = 6;
  ctx.beginPath();
  ctx.moveTo(canvas.width/2, 10);
  ctx.lineTo(canvas.width/2, canvas.height - 10);
  ctx.stroke();

  // CENTER SERVICE LINE
  ctx.strokeStyle = "white";
  ctx.lineWidth = 2;
  // Left side center line
  ctx.beginPath();
  ctx.moveTo(15, canvas.height/2);
  ctx.lineTo(canvas.width/2 - 90, canvas.height/2);
  ctx.stroke();
  // Right side center line
  ctx.beginPath();
  ctx.moveTo(canvas.width/2 + 90, canvas.height/2);
  ctx.lineTo(canvas.width - 15, canvas.height/2);
  ctx.stroke();
}

function drawBall() {
  ctx.beginPath();
  ctx.arc(ball.x, ball.y, ball.radius, 0, Math.PI*2);
  ctx.fillStyle = '#dfff00'; // Neon Pickleball
  ctx.shadowBlur = 8;
  ctx.shadowColor = '#dfff00';
  ctx.fill();
  ctx.shadowBlur = 0;
  
  // Ball holes
  ctx.fillStyle = 'rgba(0,0,0,0.2)';
  for(let i=0; i<4; i++) {
    ctx.beginPath();
    ctx.arc(ball.x + Math.cos(i)*4, ball.y + Math.sin(i)*4, 2, 0, Math.PI*2);
    ctx.fill();
  }
}

function update() {
  if (!gameRunning) return;
  ball.x += ball.dx;
  ball.y += ball.dy;

  // Ceiling/Floor Bounce
  if (ball.y < 25 || ball.y > canvas.height - 25) {
    ball.dy *= -1;
    playSfx(300, 'sine', 0.05);
  }

  // Paddle collisions
  if (ball.dx < 0 && ball.x < p1.x + p1.w && ball.y > p1.y && ball.y < p1.y + p1.h) {
    ball.dx = Math.abs(ball.dx) * 1.1;
    playSfx(600);
  }
  if (ball.dx > 0 && ball.x > p2.x - ball.radius && ball.y > p2.y && ball.y < p2.y + p2.h) {
    ball.dx = -Math.abs(ball.dx) * 1.1;
    playSfx(600);
  }

  // Scoring
  if (ball.x < 0) {
    p2Score++;
    scoreEvent();
  } else if (ball.x > canvas.width) {
    p1Score++;
    scoreEvent();
  }

  document.getElementById('p1-score').textContent = p1Score;
  document.getElementById('p2-score').textContent = p2Score;

  if (p1Score >= 5 || p2Score >= 5) {
    gameRunning = false;
    document.getElementById('game-over').classList.remove('hidden');
    document.getElementById('winner-text').innerHTML = (p1Score >= 5 ? p1.char : p2.char) + " WINS THE SET!";
    playSfx(500, 'sine', 0.2);
  }
}

function scoreEvent() {
  canvas.classList.add('red-flash');
  playSfx(100, 'sawtooth');
  setTimeout(() => canvas.classList.remove('red-flash'), 300);
  ball.x = 400; ball.y = 200;
  ball.dx = (p1Score > p2Score ? -4 : 4);
}

function loop() {
  drawCourt();
  
  // Draw Paddles
  ctx.fillStyle = "#2980b9";
  ctx.fillRect(p1.x, p1.y, p1.w, p1.h);
  ctx.fillStyle = "#c0392b";
  ctx.fillRect(p2.x, p2.y, p2.w, p2.h);
  
  // Draw Avatars next to paddles
  ctx.font = "24px Arial";
  ctx.fillText(p1.char, p1.x - 5, p1.y - 10);
  ctx.fillText(p2.char, p2.x - 10, p2.y - 10);

  drawBall();
  update();
  requestAnimationFrame(loop);
}

loop();
</script>
</body>
</html>
