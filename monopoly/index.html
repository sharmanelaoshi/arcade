<!DOCTYPE html>
<html>
<head>
    <title>Where are you going? Monopoly</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body { font-family: 'Arial Black', sans-serif; background-color: #bfdbfe; text-align: center; padding: 20px; }
        
        /* The Square Board Layout */
        .monopoly-board {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            grid-template-rows: repeat(4, 1fr);
            width: 380px;
            height: 380px;
            margin: 20px auto;
            background-color: #cee6d0; /* Classic Monopoly Green */
            border: 4px solid #333;
            gap: 4px;
            padding: 4px;
        }

        .square {
            background-color: white;
            border: 1px solid #333;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            font-size: 12px;
            font-weight: bold;
            position: relative;
            overflow: hidden;
        }

        /* Property Headers */
        .header { height: 25%; width: 100%; border-bottom: 2px solid #333; }
        .red { background: #ff0000; }
        .blue { background: #0000ff; }
        .yellow { background: #ffed00; }
        .orange { background: #f7941d; }

        /* The Empty Middle */
        .middle {
            grid-column: 2 / 4;
            grid-row: 2 / 4;
            background-color: #cee6d0;
            border: none;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        /* Player Marker */
        .active {
            background-color: #ffeb3b !important;
            box-shadow: inset 0 0 0 5px #2196F3;
            transform: scale(1.05);
            z-index: 5;
        }

        button {
            padding: 15px 40px;
            font-size: 20px;
            background-color: #e31b23; /* Monopoly Red */
            color: white;
            border: 3px solid #333;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
        }

        #sentence-display {
            margin-top: 20px;
            font-size: 22px;
            background: white;
            padding: 15px;
            border-radius: 10px;
            display: inline-block;
            border: 2px solid #333;
        }
    </style>
</head>
<body>

    <h1>MONOPOLY: TRAVEL EDITION</h1>

    <div class="monopoly-board">
        <div class="square" id="s0"><div class="header red"></div>PARK</div>
        <div class="square" id="s1"><div class="header red"></div>LIBRARY</div>
        <div class="square" id="s2"><div class="header blue"></div>HOSPITAL</div>
        <div class="square" id="s3"><div class="header blue"></div>SUPERMARKET</div>

        <div class="square" id="s7"><div class="header orange"></div>ZOO</div>
        <div class="middle">
            <div id="dice-val" style="font-size: 40px;">🎲</div>
        </div>
        <div class="square" id="s4"><div class="header yellow"></div>BOOKSTORE</div>

        <div class="square" id="s6"><div class="header orange"></div>POST OFFICE</div>
        <div class="square" id="s5"><div class="header yellow"></div>TEA SHOP</div>
        <div style="background:#eee; display:flex; align-items:center; justify-content:center;">GO</div>
        <div style="background:#eee; display:flex; align-items:center; justify-content:center;">FREE</div>
    </div>

    <button onclick="playTurn()">ROLL DICE</button>
    <br>
    <div id="sentence-display">Where are you going?</div>

    <script>
        const places = ["Park", "Library", "Hospital", "Supermarket", "Bookstore", "Tea Shop", "Post Office", "Zoo"];
        let currentPos = -1;

        function playTurn() {
            // Remove highlight
            if (currentPos !== -1) document.getElementById('s' + currentPos).classList.remove('active');

            // Roll 1-6
            const roll = Math.floor(Math.random() * 6) + 1;
            document.getElementById('dice-val').innerText = roll;

            // Update Position
            currentPos = (currentPos + roll) % places.length;

            // Highlight and Text
            document.getElementById('s' + currentPos).classList.add('active');
            document.getElementById('sentence-display').innerHTML = 
                `I am going to the <strong>${places[currentPos]}</strong>.`;
        }
    </script>

</body>
</html>
