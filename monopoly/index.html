<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fortnite Monopoly: Ranking Edition</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Bangers&family=Nunito:wght@700;900&display=swap');
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'Nunito',sans-serif;background:#0d1b2a;color:#fff;min-height:100vh;overflow:hidden}
  :root{--fn-blue:#00c3ff;--fn-yellow:#ffe566;--fn-purple:#8b5cf6;--fn-green:#22c55e;--fn-orange:#f97316;--fn-red:#ef4444;--fn-dark:#0d1b2a;--fn-card:#162235}
  
  /* LOBBY & LEADERBOARD OVERLAYS */
  #lobby, #end-screen{position:fixed;inset:0;background:rgba(0,0,0,0.97);z-index:900;display:flex;flex-direction:column;justify-content:center;align-items:center;padding:20px}
  .lobby-box, .rank-box{background:linear-gradient(145deg,#162235,#1e3a5f);padding:40px;border-radius:20px;border:4px solid var(--fn-blue);text-align:center;max-width:500px;width:100%}
  .lobby-title, .rank-title{font-family:'Bangers',cursive;font-size:52px;color:var(--fn-yellow);text-shadow:3px 3px 0 #000;margin-bottom:10px}
  
  /* HUD */
  #top-bar{background:rgba(0,0,0,0.85);padding:12px;display:flex;justify-content:space-around;gap:12px;border-bottom:4px solid var(--fn-blue)}
  .pbox{background:var(--fn-card);padding:15px;border-radius:15px;text-align:center;flex:1;border:3px solid #2a3f5f;font-size:18px}
  .pbox.active{border-color:var(--fn-yellow);box-shadow:0 0 20px rgba(255,229,102,0.4)}
  .pbox .money{color:var(--fn-green);font-weight:900;font-size:22px}

  /* BOARD - LARGE CLASSROOM SIZE */
  #board-wrap{flex:1;display:flex;justify-content:center;align-items:center;padding:20px}
  .board{display:grid;grid-template-columns:repeat(4,1fr);grid-template-rows:repeat(4,1fr);width:550px;height:550px;gap:8px;background:#071422;border:6px solid var(--fn-blue);border-radius:15px;padding:8px}
  .sq{background:#162235;border:2px solid #2a3f5f;border-radius:10px;display:flex;flex-direction:column;justify-content:center;align-items:center;font-size:16px;color:#cbd5e1;cursor:pointer;position:relative;text-align:center;font-weight:700;}
  .middle{grid-column:2/4;grid-row:2/4;background:linear-gradient(135deg,#071422,#0d2a45);border-radius:15px;display:flex;flex-direction:column;justify-content:center;align-items:center;border:3px solid var(--fn-blue)}
  
  .my-base-sq{border-color:var(--fn-purple)!important;background:linear-gradient(135deg,#2a1a5e,#4a2080)!important}
  .p-marker{position:absolute;font-size:28px;z-index:100;pointer-events:none;filter:drop-shadow(2px 2px 2px black)}

  /* SIDE PANEL */
  #side-panel{width:320px;background:rgba(0,0,0,0.7);border-left:4px solid var(--fn-blue);display:flex;flex-direction:column;padding:20px;gap:12px;}
  #msg-box{background:var(--fn-card);border-radius:15px;padding:15px;border:2px solid rgba(0,195,255,0.3);font-size:18px;color:var(--fn-yellow);font-weight:900;text-align:center;min-height:80px;display:flex;align-items:center;justify-content:center}
  .fn-btn{background:var(--fn-blue);color:#0d1b2a;border:none;padding:15px;font-size:22px;font-family:'Bangers',cursive;border-radius:12px;cursor:pointer;width:100%;border-bottom:5px solid #0082aa;margin-top:10px}
  
  /* RANKING LIST */
  .rank-item { background: rgba(0,0,0,0.3); margin: 10px 0; padding: 15px; border-radius: 10px; display: flex; justify-content: space-between; align-items: center; font-size: 20px; border: 1px solid var(--fn-blue); }
  .rank-1 { border-color: var(--fn-yellow); box-shadow: 0 0 10px var(--fn-yellow); }
</style>
</head>
<body>

<div id="lobby">
  <div class="lobby-box">
    <div class="lobby-title">🎮 MATCH LOBBY</div>
    <div id="setup-container"></div>
    <button class="fn-btn" style="background:var(--fn-yellow); color:#000" onclick="startGame()">⚡ DROP IN</button>
  </div>
</div>

<div id="end-screen" style="display:none">
  <div class="rank-box">
    <div class="rank-title">🏆 FINAL RANKINGS</div>
    <div id="rank-list"></div>
    <button class="fn-btn" onclick="location.reload()">🔄 NEW MATCH</button>
  </div>
</div>

<div id="top-bar">
  <div class="pbox" id="pbox0"><div id="pav0" style="font-size:32px"></div><div class="money">$<span id="pm0">250</span></div><div>🎒 <span id="pc0">0</span>/8</div></div>
  <div class="pbox" id="pbox1"><div id="pav1" style="font-size:32px"></div><div class="money">$<span id="pm1">250</span></div><div>🎒 <span id="pc1">0</span>/8</div></div>
  <div class="pbox" id="pbox2"><div id="pav2" style="font-size:32px"></div><div class="money">$<span id="pm2">250</span></div><div>🎒 <span id="pc2">0</span>/8</div></div>
</div>

<div style="display:flex; flex:1;">
  <div id="board-wrap">
    <div class="board" id="board">
      <div class="sq" id="sq3" onclick="clickSq(3)">P3 BASE🔵</div>
      <div class="sq" id="sq4" onclick="clickSq(4)">SUPERMARKET🛒</div>
      <div class="sq" id="sq5" onclick="clickSq(5)">HOSPITAL🏥</div>
      <div class="sq" id="sq6" onclick="clickSq(6)">P2 BASE🟢</div>
      <div class="sq" id="sq2" onclick="clickSq(2)">BOOKSTORE📚</div>
      <div class="middle"><div id="dice" style="font-size:80px">🎲</div></div>
      <div class="sq" id="sq7" onclick="clickSq(7)">POST OFFICE✉️</div>
      <div class="sq" id="sq1" onclick="clickSq(1)">PARK🌳</div>
      <div class="sq" id="sq8" onclick="clickSq(8)">TEA SHOP🧋</div>
      <div class="sq" id="sq0" onclick="clickSq(0)">P1 BASE🔴</div>
      <div class="sq" id="sq11" onclick="clickSq(11)">ZOO🦁</div>
      <div class="sq" id="sq10" onclick="clickSq(10)">LIBRARY📖</div>
      <div class="sq" id="sq9" onclick="clickSq(9)">FREE SPACE⭐</div>
    </div>
  </div>

  <div id="side-panel">
    <div id="msg-box">Counting skills ready?</div>
    <button class="fn-btn" id="rollBtn" onclick="rollDice()">🎲 ROLL DICE</button>
    
    <div id="interact-area"></div>
  </div>
</div>

<script>
const SHOPS={
  1:{name:"Park",items:[{n:"Kite",p:10,e:"🪁"}]},
  2:{name:"Bookstore",items:[{n:"Pen",p:5,e:"✏️"}]},
  4:{name:"Supermarket",items:[{n:"Shield",p:25,e:"🛡️"}]},
  5:{name:"Hospital",items:[{n:"Medkit",p:60,e:"🩹"}]},
  7:{name:"Post Office",items:[{n:"Stamp",p:5,e:"📮"}]},
  8:{name:"Tea Shop",items:[{n:"Slurp Juice",p:35,e:"🧋"}]},
  10:{name:"Library",items:[{n:"Book",p:45,e:"📕"}]},
  11:{name:"Zoo",items:[{n:"Ice Cream",p:20,e:"🍦"}]}
};
const BASE_POS=[0,6,3]; 
let players=[{id:1,pos:0,money:250,items:[],avatar:''},{id:2,pos:6,money:250,items:[],avatar:''},{id:3,pos:3,money:250,items:[],avatar:''}];
let turn=0, rollVal=0, targetPos=-1;

// Setup Lobby
const setup=document.getElementById('setup-container');
players.forEach((p,i)=>{
    setup.innerHTML+=`<div style="margin:10px">P${p.id}: <select id="av${i}"><option>🦊</option><option>🐯</option><option>🐹</option><option>🤖</option></select></div>`;
});

function startGame(){
    players.forEach((p,i)=> p.avatar=document.getElementById('av'+i).value);
    document.getElementById('lobby').style.display='none';
    updateUI();
}

function rollDice(){
    if(rollVal!==0) return;
    rollVal=Math.floor(Math.random()*6)+1;
    document.getElementById('dice').textContent=rollVal;
    targetPos=(players[turn].pos+rollVal)%12;
    document.getElementById('msg-box').innerText=`P${turn+1}: Move ${rollVal} spaces!`;
    document.getElementById('rollBtn').disabled=true;
}

function clickSq(idx){
    if(rollVal===0) return;
    if(idx!==targetPos){
        document.getElementById('msg-box').innerText="Wrong square! Count again.";
        return;
    }
    players[turn].pos=idx;
    processLanding(idx);
}

function processLanding(idx){
    const area=document.getElementById('interact-area');
    area.innerHTML='';
    if(BASE_POS.includes(idx) && idx!==BASE_POS[turn]){
        area.innerHTML=`<div class="panel"><h3>ENEMY BASE</h3><button class="fn-btn" style="background:var(--fn-red)" onclick="pay(50)">Pay $50</button><button class="fn-btn" style="background:var(--fn-purple)" onclick="playRPS()">RPS Challenge</button></div>`;
    } else if(SHOPS[idx]){
        const s=SHOPS[idx];
        area.innerHTML=`<div class="panel"><h3>${s.name}</h3><button class="fn-btn" style="background:var(--fn-green)" onclick="buy(${s.items[0].p})">Buy ${s.items[0].n} ($${s.items[0].p})</button><button class="fn-btn" onclick="next()">Skip</button></div>`;
    } else {
        setTimeout(next, 800);
    }
    updateUI();
}

function pay(amt){ players[turn].money-=amt; next(); }
function buy(amt){ 
    if(players[turn].money>=amt){
        players[turn].money-=amt; 
        players[turn].items.push(true); 
        next();
    } else { alert("NOT ENOUGH MONEY!"); }
}

function playRPS(){
    const res = Math.random();
    if(res < 0.33) alert("WIN! Free stay.");
    else if(res < 0.66) alert("DRAW! Safe passage.");
    else { alert("LOSS! Penalty $100."); players[turn].money-=100; }
    next();
}

function next(){
    if(players[turn].items.length>=8 || players[turn].money<0){ showRanks(); return; }
    turn=(turn+1)%3; rollVal=0; targetPos=-1;
    document.getElementById('rollBtn').disabled=false;
    document.getElementById('interact-area').innerHTML='';
    updateUI();
}

function showRanks(){
    document.getElementById('end-screen').style.display='flex';
    // Rank by Items first, then by Money
    const ranked = [...players].sort((a,b)=> b.items.length - a.items.length || b.money - a.money);
    const list = document.getElementById('rank-list');
    ranked.forEach((p,i)=>{
        list.innerHTML+=`<div class="rank-item rank-${i+1}"><span>#${i+1} ${p.avatar} P${p.id}</span><span>🎒 ${p.items.length} | $${p.money}</span></div>`;
    });
}

function updateUI(){
    players.forEach((p,i)=>{
        document.getElementById('pav'+i).textContent=p.avatar;
        document.getElementById('pm'+i).textContent=p.money;
        document.getElementById('pc'+i).textContent=p.items.length;
        document.getElementById('pbox'+i).className='pbox'+(i===turn?' active':'');
    });
    document.querySelectorAll('.p-marker').forEach(m=>m.remove());
    document.querySelectorAll('.sq').forEach(s=>s.classList.remove('my-base-sq'));
    document.getElementById('sq'+BASE_POS[turn]).classList.add('my-base-sq');
    players.forEach((p,i)=>{
        const m=document.createElement('span'); m.className='p-marker'; m.textContent=p.avatar;
        m.style.left=(i*20)+'px'; document.getElementById('sq'+p.pos).appendChild(m);
    });
}
</script>
</body>
</html>
