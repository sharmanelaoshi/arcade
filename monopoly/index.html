<!DOCTYPE html>
<html>
<head>
    <title>Monopoly: Where are you going?</title>
    <style>
        body { font-family: sans-serif; text-align: center; background: #2c3e50; color: white; }
        canvas { background: white; border: 5px solid #ecf0f1; border-radius: 10px; cursor: pointer; max-width: 95%; }
        .info { margin-top: 20px; font-size: 24px; }
        button { padding: 15px 40px; font-size: 20px; background: #27ae60; color: white; border: none; border-radius: 5px; cursor: pointer; }
    </style>
</head>
<body>

    <h1>🎲 Destination Monopoly</h1>
    <canvas id="gameCanvas" width="400" height="400"></canvas>
    
    <div class="info">
        <button onclick="rollDice()">ROLL DICE</button>
        <p id="status">Click to start your journey!</p>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const places = ["Park", "Library", "Hospital", "Supermarket", "Bookstore", "Tea Shop", "Post Office", "Zoo"];
        let currentPos = -1;

        function drawBoard() {
            ctx.clearRect(0, 0, 400, 400);
            const size = 100;
            const spots = [
                {x: 0, y: 0, color: "#e74c3c"},   // Park
                {x: 150, y: 0, color: "#e74c3c"}, // Library
                {x: 300, y: 0, color: "#3498db"}, // Hospital
                {x: 300, y: 150, color: "#3498db"}, // Supermarket
                {x: 300, y: 300, color: "#f1c40f"}, // Bookstore
                {x: 150, y: 300, color: "#f1c40f"}, // Tea Shop
                {x: 0, y: 300, color: "#9b59b6"}, // Post Office
                {x: 0, y: 150, color: "#9b59b6"}  // Zoo
            ];

            spots.forEach((s, i) => {
                // Draw Square
                ctx.fillStyle = (currentPos === i) ? "#2ecc71" : "white";
                ctx.fillRect(s.x, s.y, size, size);
                ctx.strokeStyle = "#333";
                ctx.lineWidth = 2;
                ctx.strokeRect(s.x, s.y, size, size);

                // Draw Color Bar
                ctx.fillStyle = s.color;
                ctx.fillRect(s.x, s.y, size, 20);

                // Draw Text
                ctx.fillStyle = "black";
                ctx.font = "bold 12px Arial";
                ctx.fillText(places[i], s.x + 5, s.y + 45);
            });

            // Draw center dice area
            ctx.fillStyle = "#ecf0f1";
            ctx.fillRect(110, 110, 180, 180);
            ctx.fillStyle = "#34495e";
            ctx.font = "20px Arial";
            ctx.fillText("GO!", 180, 200);
        }

        function rollDice() {
            const roll = Math.floor(Math.random() * 6) + 1;
            currentPos = (currentPos + roll) % places.length;
            drawBoard();
            document.getElementById('status').innerHTML = `You rolled a ${roll}! <br> <b>I am going to the ${places[currentPos]}.</b>`;
        }

        drawBoard(); // Initial draw
    </script>
</body>
</html>
