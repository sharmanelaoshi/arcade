<!DOCTYPE html>
<html>
<head>
    <title>Grade 5 City Explorer</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f0f7f4; text-align: center; }
        #stats { background: #2d3436; color: white; padding: 15px; font-size: 20px; border-bottom: 5px solid #00b894; }
        
        .board { 
            display: grid; grid-template-columns: repeat(4, 1fr); grid-template-rows: repeat(4, 1fr); 
            width: 450px; height: 450px; margin: 20px auto; background: white; border: 4px solid #2d3436; gap: 4px;
        }
        
        .square { 
            border: 1px solid #dfe6e9; display: flex; flex-direction: column; 
            justify-content: center; align-items: center; font-size: 13px; font-weight: bold; background: #ffffff;
        }

        .middle { grid-column: 2 / 4; grid-row: 2 / 4; background: #dfe6e9; display: flex; flex-direction: column; justify-content: center; align-items: center; }
        
        /* Player Marker */
        .active { background: #ffeaa7 !important; border: 3px solid #fdcb6e; transform: scale(1.05); z-index: 10; }
        
        /* Action UI */
        #action-card { 
            display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: white; border: 3px solid #2d3436; padding: 20px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.3); z-index: 100; width: 300px;
        }

        button { padding: 10px 20px; margin: 10px; cursor: pointer; border-radius: 5px; border: none; font-weight: bold; }
        .btn-roll { background: #0984e3; color: white; font-size: 18px; }
        .btn-buy { background: #00b894; color: white; }
        .btn-do { background: #6c5ce7; color: white; }
        
        .owned-tag { font-size: 10px; color: #d63031; display: none; }
    </style>
</head>
<body>

<div id="stats">💰 Wallet: $<span id="money">1000</span> | 🎒 Inventory: <span id="items">Empty</span></div>

<div class="board">
    <div class="square" id="s0">PARK<br><span class="owned-tag">OWNED</span></div>
    <div class="square" id="s1">LIBRARY<br><span class="owned-tag">OWNED</span></div>
    <div class="square" id="s2">HOSPITAL<br><span class="owned-tag">OWNED</span></div>
    <div class="square" id="s3">SUPERMARKET<br><span class="owned-tag">OWNED</span></div>
    
    <div class="square" id="s7">ZOO<br><span class="owned-tag">OWNED</span></div>
    <div class="middle">
        <div id="dice" style="font-size: 40px; margin-bottom: 10px;">🎲</div>
        <button class="btn-roll" onclick="roll()">ROLL DICE</button>
    </div>
    <div class="square" id="s4">BOOKSTORE<br><span class="owned-tag">OWNED</span></div>
    
    <div class="square" id="s6">POST OFFICE<br><span class="owned-tag">OWNED</span></div>
    <div class="square" id="s5">TEA SHOP<br><span class="owned-tag">OWNED</span></div>
    <div class="square" style="background:#b2bec3">GO</div>
    <div class="square" style="background:#b2bec3">FREE</div>
</div>

<div id="action-card">
    <h2 id="place-name">Place</h2>
    <p id="place-desc">What do you want to do?</p>
    <button class="btn-buy" id="buy-btn">Buy Property</button>
    <button class="btn-do" id="do-btn">Do Activity</button>
    <br>
    <button onclick="closeCard()" style="background:#eee">Just passing through...</button>
</div>

<script>
    let money = 1000;
    let currentPos = -1;
    let inventory = [];
    
    const data = [
        { name: "Park", buy: 200, do: "Rent a Bike", cost: 20, item: "Bicycle" },
        { name: "Library", buy: 150, do: "Get a Membership", cost: 10, item: "Library Card" },
        { name: "Hospital", buy: 400, do: "Health Check-up", cost: 100, item: "Health Certificate" },
        { name: "Supermarket", buy: 300, do: "Buy Groceries", cost: 50, item: "Fruit Basket" },
        { name: "Bookstore", buy: 250, do: "Buy a Manga", cost: 30, item: "Cool Book" },
        { name: "Tea Shop", buy: 100, do: "Drink Bubble Tea", cost: 60, item: "Pearl Milk Tea" },
        { name: "Post Office", buy: 200, do: "Send a Letter", cost: 5, item: "Stamps" },
        { name: "Zoo", buy: 500, do: "Feed the Lions", cost: 80, item: "Zoo Badge" }
    ];

    function roll() {
        if (currentPos !== -1) document.getElementById('s' + currentPos).classList.remove('active');
        const move = Math.floor(Math.random() * 6) + 1;
        document.getElementById('dice').innerText = move;
        currentPos = (currentPos + move) % 8;
        
        document.getElementById('s' + currentPos).classList.add('active');
        setTimeout(showAction, 500);
    }

    function showAction() {
        const place = data[currentPos];
        document.getElementById('action-card').style.display = 'block';
        document.getElementById('place-name').innerText = place.name;
        document.getElementById('buy-btn').innerText = `Buy Property ($${place.buy})`;
        document.getElementById('do-btn').innerText = `${place.do} ($${place.cost})`;
        
        document.getElementById('buy-btn').onclick = () => {
            if(money >= place.buy) {
                money -= place.buy;
                document.getElementById('s' + currentPos).querySelector('.owned-tag').style.display = 'block';
                updateStats();
                closeCard();
            } else { alert("Not enough money!"); }
        };

        document.getElementById('do-btn').onclick = () => {
            if(money >= place.cost) {
                money -= place.cost;
                inventory.push(place.item);
                updateStats();
                closeCard();
            } else { alert("Not enough money!"); }
        };
    }

    function closeCard() { document.getElementById('action-card').style.display = 'none'; }
    
    function updateStats() {
        document.getElementById('money').innerText = money;
        document.getElementById('items').innerText = inventory.join(", ") || "Empty";
    }
</script>

</body>
</html>
