<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fortnite Monopoly: Arcade Edition</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Bangers&family=Nunito:wght@700;900&display=swap');
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'Nunito',sans-serif;background:#0d1b2a;color:#fff;min-height:100vh;overflow-x:hidden}
  :root{--fn-blue:#00c3ff;--fn-yellow:#ffe566;--fn-purple:#8b5cf6;--fn-green:#22c55e;--fn-orange:#f97316;--fn-red:#ef4444;--fn-dark:#0d1b2a;--fn-card:#162235}
  
  /* LOBBY SCREEN */
  #lobby{position:fixed;inset:0;background:rgba(0,0,0,0.97);z-index:900;display:flex;flex-direction:column;justify-content:center;align-items:center;padding:20px}
  .lobby-box{background:linear-gradient(145deg,#162235,#1e3a5f);padding:30px;border-radius:20px;border:3px solid var(--fn-blue);box-shadow:0 0 40px rgba(0,195,255,0.3);text-align:center;max-width:420px;width:100%}
  .lobby-title{font-family:'Bangers',cursive;font-size:42px;letter-spacing:3px;color:var(--fn-yellow);text-shadow:3px 3px 0 #0d1b2a;margin-bottom:5px}
  .player-setup{background:rgba(0,0,0,0.3);border-radius:12px;padding:12px;margin:8px 0;display:flex;align-items:center;gap:10px;border:1px solid rgba(255,255,255,0.1)}
  .player-setup select{background:#0d1b2a;color:#fff;border:1px solid var(--fn-blue);border-radius:8px;padding:6px 8px;font-size:20px;flex:1;cursor:pointer}
  .start-btn{background:var(--fn-yellow);color:#0d1b2a;border:none;padding:14px 28px;font-size:22px;font-family:'Bangers',cursive;letter-spacing:2px;border-radius:12px;cursor:pointer;width:100%;margin-top:15px;border-bottom:5px solid #c8a200;}

  /* HUD */
  #top-bar{background:rgba(0,0,0,0.85);padding:8px 12px;display:flex;justify-content:space-around;gap:8px;border-bottom:3px solid var(--fn-blue)}
  .pbox{background:var(--fn-card);padding:8px 12px;border-radius:10px;text-align:center;flex:1;border:2px solid #2a3f5f;transition:all 0.3s;font-size:13px}
  .pbox.active{border-color:var(--fn-yellow);box-shadow:0 0 15px rgba(255,229,102,0.4)}
  .pbox .money{color:var(--fn-green);font-weight:900;font-size:16px}

  /* BOARD */
  #board-wrap{flex:1;display:flex;justify-content:center;align-items:center;padding:16px}
  .board{display:grid;grid-template-columns:repeat(4,1fr);grid-template-rows:repeat(4,1fr);width:320px;height:320px;gap:4px;background:#071422;border:4px solid var(--fn-blue);border-radius:12px;padding:4px}
  .sq{background:#162235;border:1px solid #2a3f5f;border-radius:8px;display:flex;flex-direction:column;justify-content:center;align-items:center;font-size:10px;color:#cbd5e1;cursor:pointer;position:relative;text-align:center;padding:2px;font-weight:700;}
  .middle{grid-column:2/4;grid-row:2/4;background:linear-gradient(135deg,#071422,#0d2a45);border-radius:10px;display:flex;flex-direction:column;justify-content:center;align-items:center;border:2px solid var(--fn-blue)}
  
  /* HIGHLIGHTS */
  .correct-dest{border-color:var(--fn-yellow)!important;box-shadow:0 0 10px rgba(255,229,102,0.5)!important;}
  .my-base-sq{border-color:var(--fn-purple)!important;background:linear-gradient(135deg,#2a1a5e,#4a2080)!important}
  .p-marker{position:absolute;font-size:13px;z-index:10;pointer-events:none}

  /* SIDE PANEL */
  #side-panel{width:240px;background:rgba(0,0,0,0.6);border-left:3px solid var(--fn-blue);display:flex;flex-direction:column;padding:12px;gap:8px;}
  #msg-box{background:var(--fn-card);border-radius:10px;padding:10px;border:1px solid rgba(0,195,255,0.3);font-size:13px;color:var(--fn-yellow);font-weight:900;text-align:center;min-height:44px;}
  .fn-btn{background:var(--fn-blue);color:#0d1b2a;border:none;padding:10px;font-size:16px;font-family:'Bangers',cursive;border-radius:10px;cursor:pointer;width:100%;border-bottom:4px solid #0082aa;margin-top:4px}
  .panel{background:var(--fn-card);border-radius:12px;border:2px solid rgba(0,195,255,0.3);padding:10px}
  .rps-row{display:flex;gap:6px;margin-top:8px}
  .rps-btn{flex:1;font-size:24px;background:rgba(255,255,255,0.08);border:2px solid rgba(255,255,255,0.2);border-radius:10px;cursor:pointer}
</style>
</head>
<body>

<div id="lobby">
  <div class="lobby-box">
    <div class="lobby-title">🎮 QUEST LOBBY</div>
    <div class="player-setup"><label>P1</label><select id="av0"><option value="🦊">🦊 Fox</option><option value="🐯">🐯 Tiger</option></select></div>
    <div class="player-setup"><label>P2</label><select id="av1"><option value="🐺">🐺 Wolf</option><option value="🐸">🐸 Frog</option></select></div>
    <div class="player-setup"><label>P3</label><select id="av2"><option value="🦋">🦋 Butterfly</option><option value="🐉">🐉 Dragon</option></select></div>
    <button class="start-btn" onclick="startGame()">⚡ DEPLOY!</button>
  </div>
</div>

<div id="top-bar">
  <div class="pbox" id="pbox0"><div class="av" id="pav0"></div><div class="money">$<span id="pm0">250</span></div><div class="stat">🎒 <span id="pc0">0</span>/8</div></div>
  <div class="pbox" id="pbox1"><div class="av" id="pav1"></div><div class="money">$<span id="pm1">250</span></div><div class="stat">🎒 <span id="pc1">0</span>/8</div></div>
  <div class="pbox" id="pbox2"><div class="av" id="pav2"></div><div class="money">$<span id="pm2">250</span></div><div class="stat">🎒 <span id="pc2">0</span>/8</div></div>
</div>

<div style="display:flex; flex:1;">
  <div id="board-wrap">
    <div class="board" id="board">
      <div class="sq" id="sq3" onclick="clickSq(3)"><div class="icon">🔵</div>P3 Base</div>
      <div class="sq" id="sq4" onclick="clickSq(4)"><div class="icon">🛒</div>Market</div>
      <div class="sq" id="sq5" onclick="clickSq(5)"><div class="icon">🏥</div>Hospital</div>
      <div class="sq" id="sq6" onclick="clickSq(6)"><div class="icon">🟢</div>P2 Base</div>
      <div class="sq" id="sq2" onclick="clickSq(2)"><div class="icon">📚</div>Bookstore</div>
      <div class="middle"><div id="dice" style="font-size:52px">🎲</div></div>
      <div class="sq" id="sq7" onclick="clickSq(7)"><div class="icon">✉️</div>Post Office</div>
      <div class="sq" id="sq1" onclick="clickSq(1)"><div class="icon">🌳</div>Park</div>
      <div class="sq" id="sq8" onclick="clickSq(8)"><div class="icon">🧋</div>Tea Shop</div>
      <div class="sq" id="sq0" onclick="clickSq(0)"><div class="icon">🔴</div>P1 Base</div>
      <div class="sq" id="sq11" onclick="clickSq(11)"><div class="icon">🦁</div>Zoo</div>
      <div class="sq" id="sq10" onclick="clickSq(10)"><div class="icon">📖</div>Library</div>
      <div class="sq" id="sq9" onclick="clickSq(9)"><div class="icon">⭐</div>Free Space</div>
    </div>
  </div>

  <div id="side-panel">
    <div id="msg-box">Welcome!</div>
    <button class="fn-btn" id="rollBtn" onclick="rollDice()">🎲 ROLL DICE</button>
    
    <div class="panel" id="shop-panel" style="display:none">
        <div id="shop-title" style="font-weight:900; color:var(--fn-blue); margin-bottom:10px;">SHOP</div>
        <div id="shop-items"></div>
        <button class="fn-btn" onclick="endTurn()">Skip</button>
    </div>

    <div class="panel" id="base-panel" style="display:none">
        <div style="color:var(--fn-red); font-weight:900;">Enemy Base!</div>
        <button class="fn-btn" style="background:var(--fn-red)" onclick="payFee()">Pay $50</button>
        <button class="fn-btn" style="background:var(--fn-purple)" onclick="showRPS()">Challenge RPS!</button>
        <div id="rps-area" style="display:none; margin-top:10px;">
            <div class="rps-row">
                <button class="rps-btn" onclick="playRPS('Rock')">✊</button>
                <button class="rps-btn" onclick="playRPS('Paper')">🖐️</button>
                <button class="rps-btn" onclick="playRPS('Scissors')">✌️</button>
            </div>
            <div id="rps-result" style="font-size:12px; margin-top:5px;"></div>
        </div>
    </div>
  </div>
</div>

<script>
const SHOPS={
  1:{name:"Park",items:[{n:"Kite",p:10,e:"🪁"}]},
  2:{name:"Bookstore",items:[{n:"Pen",p:5,e:"✏️"}]},
  4:{name:"Supermarket",items:[{n:"Shield",p:25,e:"🛡️"}]},
  5:{name:"Hospital",items:[{n:"Medkit",p:60,e:"🩹"}]},
  7:{name:"Post Office",items:[{n:"Stamp",p:5,e:"📮"}]},
  8:{name:"Tea Shop",items:[{n:"Slurp Juice",p:35,e:"🧋"}]},
  10:{name:"Library",items:[{n:"Book",p:45,e:"📕"}]},
  11:{name:"Zoo",items:[{n:"Toy Llama",p:140,e:"🦙"}]}
};
const BASE_POS=[0,6,3]; 
let players=[{pos:0,money:250,items:[]},{pos:6,money:250,items:[]},{pos:3,money:250,items:[]}];
let turn=0, rollVal=0, targetPos=-1;

function startGame(){
  for(let i=0;i<3;i++) players[i].avatar=document.getElementById('av'+i).value;
  document.getElementById('lobby').style.display='none';
  updateAll();
}

function rollDice(){
  if(rollVal!==0) return;
  rollVal=Math.floor(Math.random()*6)+1;
  document.getElementById('dice').textContent=rollVal;
  targetPos=(players[turn].pos+rollVal)%12;
  document.getElementById('rollBtn').disabled=true;
  updateBoard();
}

function clickSq(idx){
  if(rollVal===0 || idx!==targetPos) return;
  players[turn].pos=idx;
  document.getElementById('shop-panel').style.display='none';
  document.getElementById('base-panel').style.display='none';

  if(BASE_POS.includes(idx) && idx!==BASE_POS[turn]){
      document.getElementById('base-panel').style.display='block';
  } else if(SHOPS[idx]){
      showShop(idx);
  } else {
      setTimeout(endTurn, 500);
  }
  updateAll();
}

function showShop(idx){
    const s = SHOPS[idx];
    document.getElementById('shop-title').innerText = s.name;
    const cont = document.getElementById('shop-items');
    cont.innerHTML = '';
    s.items.forEach(item => {
        const b = document.createElement('button');
        b.className = 'fn-btn';
        b.style.background = 'var(--fn-green)';
        b.innerText = `Buy ${item.e} ($${item.p})`;
        b.onclick = () => {
            if(players[turn].money >= item.p){
                players[turn].money -= item.p;
                players[turn].items.push(item);
                endTurn();
            }
        };
        cont.appendChild(b);
    });
    document.getElementById('shop-panel').style.display='block';
}

function showRPS(){ document.getElementById('rps-area').style.display='block'; }

function playRPS(p){
    const opts = ['Rock','Paper','Scissors'];
    const cpu = opts[Math.floor(Math.random()*3)];
    if(p===cpu){ alert("Draw!"); }
    else if((p==='Rock'&&cpu==='Scissors')||(p==='Paper'&&cpu==='Rock')||(p==='Scissors'&&cpu==='Paper')){
        alert("You Win! Free stay.");
    } else {
        alert("You Lose! Paid $100.");
        players[turn].money -= 100;
    }
    endTurn();
}

function payFee(){ players[turn].money -= 50; endTurn(); }

function endTurn(){
  if(players[turn].items.length>=8){ alert("P"+(turn+1)+" Victory Royale!"); location.reload(); return; }
  turn=(turn+1)%3; rollVal=0; targetPos=-1;
  document.getElementById('rollBtn').disabled=false;
  document.getElementById('shop-panel').style.display='none';
  document.getElementById('base-panel').style.display='none';
  document.getElementById('rps-area').style.display='none';
  updateAll();
}

function updateAll(){
  for(let i=0;i<3;i++){
    document.getElementById('pav'+i).textContent=players[i].avatar;
    document.getElementById('pm'+i).textContent=players[i].money;
    document.getElementById('pc'+i).textContent=players[i].items.length;
    document.getElementById('pbox'+i).className='pbox'+(i===turn?' active':'');
  }
  updateBoard();
}

function updateBoard(){
  document.querySelectorAll('.p-marker').forEach(m=>m.remove());
  document.querySelectorAll('.sq').forEach(s=>s.classList.remove('correct-dest','my-base-sq'));
  document.getElementById('sq'+BASE_POS[turn]).classList.add('my-base-sq');
  if(targetPos>=0) document.getElementById('sq'+targetPos).classList.add('correct-dest');
  players.forEach((p,i)=>{
    const m=document.createElement('span');
    m.className='p-marker'; m.textContent=p.avatar;
    m.style.left=(i*12)+'px'; document.getElementById('sq'+p.pos).appendChild(m);
  });
}
</script>
</body>
</html>
