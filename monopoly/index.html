<!DOCTYPE html>
<html>
<head>
    <title>3-Player Monopoly Quest</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body { font-family: 'Arial Black', sans-serif; background: #6c5ce7; text-align: center; padding: 10px; font-size: 24px; color: white; }
        
        #setup, #game-ui, #shop-ui, #quest-ui { 
            background: white; padding: 25px; border-radius: 25px; border: 6px solid #2d3436; 
            margin: 10px auto; max-width: 550px; color: #2d3436;
        }

        @keyframes flashRed {
            0% { background-color: #ff7675; }
            100% { background-color: #6c5ce7; }
        }
        .error-flash { animation: flashRed 0.8s; }

        .board { 
            display: grid; grid-template-columns: repeat(4, 1fr); grid-template-rows: repeat(4, 1fr); 
            width: 440px; height: 440px; margin: auto; background: #2d3436; border: 8px solid #2d3436; gap: 8px; padding: 8px;
        }
        
        .square { 
            background: white; border: 2px solid #b2bec3; display: flex; flex-direction: column; 
            justify-content: center; align-items: center; font-size: 16px; cursor: pointer; 
            position: relative; font-weight: bold; color: black;
        }

        /* The Bases you requested */
        #s0 { border: 6px solid #ff7675; background: #fff5f5; } /* P1 - Lower Left */
        #s3 { border: 6px solid #a29bfe; background: #f3f0ff; } /* P3 - Upper Left */
        #s6 { border: 6px solid #55efc4; background: #f0fff4; } /* P2 - Upper Right */
        #s9 { background: #dfe6e9; }                          /* Lower Right Corner */

        .middle { grid-column: 2 / 4; grid-row: 2 / 4; background: #fdcb6e; border-radius: 20px; display: flex; flex-direction: column; justify-content: center; align-items: center; }
        .p-marker { font-size: 45px; position: absolute; transition: all 0.3s; z-index: 50; text-shadow: 2px 2px 4px rgba(0,0,0,0.3); }
        
        button { padding: 15px 30px; font-size: 24px; border-radius: 50px; border: none; background: #d63031; color: white; cursor: pointer; font-weight: bold; box-shadow: 0 5px #a11b1b; }
        button:disabled { background: #b2bec3; box-shadow: none; }

        .player-box { display: inline-block; width: 30%; padding: 10px; border: 4px solid #dfe6e9; border-radius: 20px; font-size: 16px; background: white; color: black; }
        .current-turn { border-color: #fdcb6e; background: #fff9db; }
    </style>
</head>
<body id="main-body">

<div id="setup">
    <h1>Game Setup</h1>
    P1 Base (Low-L): 🔴 <select id="p0-av" style="font-size:20px;"><option>🐱</option><option>🐶</option></select><br>
    P2 Base (Up-R): 🟢 <select id="p1-av" style="font-size:20px;"><option>🐰</option><option>🦊</option></select><br>
    P3 Base (Up-L): 🔵 <select id="p2-av" style="font-size:20px;"><option>🐯</option><option>🐨</option></select><br><br>
    <button onclick="startGame()">START GAME 🏁</button>
</div>

<div id="game-ui" style="display:none">
    <div id="player-stats">
        <div class="player-box" id="box-0">P1 <span id="p0-icon"></span><br>$<span id="p0-m">500</span><br>🎒 <span id="p0-c">0</span>/8</div>
        <div class="player-box" id="box-1">P2 <span id="p1-icon"></span><br>$<span id="p1-m">500</span><br>🎒 <span id="p1-c">0</span>/8</div>
        <div class="player-box" id="box-2">P3 <span id="p2-icon"></span><br>$<span id="p2-m">500</span><br>🎒 <span id="p2-c">0</span>/8</div>
    </div>
    <p id="msg" style="color:white; font-size: 26px;">P1: Roll the dice!</p>
</div>

<div class="board" id="main-board" style="display:none">
    <div class="square" id="s3" onclick="checkClick(3)">P3 BASE🔵</div>
    <div class="square" id="s4" onclick="checkClick(4)">Market🛒</div>
    <div class="square" id="s5" onclick="checkClick(5)">Clinic🏥</div>
    <div class="square" id="s6" onclick="checkClick(6)">P2 BASE🟢</div>
    
    <div class="square" id="s2" onclick="checkClick(2)">Book📚</div>
    <div class="middle">
        <div id="dice-val" style="font-size: 60px;">🎲</div>
        <button id="rollBtn" onclick="roll()">ROLL</button>
    </div>
    <div class="square" id="s7" onclick="checkClick(7)">Post✉️</div>

    <div class="square" id="s1" onclick="checkClick(1)">Park🌳</div>
    <div class="square" id="s8" onclick="checkClick(8)">Tea🧋</div>

    <div class="square" id="s0" onclick="checkClick(0)">P1 BASE🔴</div>
    <div class="square" id="s11" onclick="checkClick(11)">Zoo🦁</div>
    <div class="square" id="s10" onclick="checkClick(10)">Lib📖</div>
    <div class="square" id="s9" onclick="checkClick(9)">FREE🎁</div>
</div>

<div id="shop-ui">
    <h2 id="shop-name">Shop</h2>
    <div id="shop-options"></div>
</div>

<div id="quest-ui">
    <h2 style="color:red">⚠️ VISITOR QUEST!</h2>
    <p>You landed on another player's base!</p>
    <button onclick="payFee()" style="background:#d63031">Pay $50 to pass</button>
</div>

<script>
    let players = [
        { pos: 0, money: 500, items: new Set(), avatar: '' },
        { pos: 6, money: 500, items: new Set(), avatar: '' },
        { pos: 3, money: 500, items: new Set(), avatar: '' }
    ];
    let turn = 0, rollVal = 0, targetPos = -1;

    const shops = {
        1: { name: "Park", items: [{n: "Balloon", p: 10}, {n: "Kite", p: 50}] },
        2: { name: "Bookstore", items: [{n: "Manga", p: 30}, {n: "Map", p: 100}] },
        4: { name: "Market", items: [{n: "Apple", p: 15}, {n: "Basket", p: 90}] },
        5: { name: "Clinic", items: [{n: "Mask", p: 10}, {n: "Medicine", p: 80}] },
        7: { name: "Post Office", items: [{n: "Stamp", p: 5}, {n: "Card", p: 25}] },
        8: { name: "Tea Shop", items: [{n: "Green Tea", p: 35}, {n: "Bubble Tea", p: 70}] },
        10: { name: "Library", items: [{n: "Pen", p: 5}, {n: "Book", p: 40}] },
        11: { name: "Zoo", items: [{n: "Ice Cream", p: 20}, {n: "Lion Toy", p: 150}] }
    };

    function startGame() {
        for(let i=0; i<3; i++) players[i].avatar = document.getElementById(`p${i}-av`).value;
        document.getElementById('setup').style.display = 'none';
        document.getElementById('game-ui').style.display = 'block';
        document.getElementById('main-board').style.display = 'grid';
        updateBoard();
        updateTurnUI();
    }

    function roll() {
        rollVal = Math.floor(Math.random() * 6) + 1;
        document.getElementById('dice-val').innerText = rollVal;
        targetPos = (players[turn].pos + rollVal) % 12;
        document.getElementById('msg').innerText = `P${turn+1}: Count ${rollVal} spaces clockwise!`;
        document.getElementById('rollBtn').disabled = true;
    }

    function checkClick(idx) {
        if (rollVal === 0) return;
        if (idx === targetPos) {
            if (shops[idx]) {
                openShop(idx);
            } else if ((idx === 0 || idx === 3 || idx === 6) && idx !== players[turn].pos) {
                document.getElementById('quest-ui').style.display = 'block';
            } else {
                players[turn].pos = idx;
                updateBoard();
                nextTurn();
            }
        } else {
            document.getElementById('main-body').classList.add('error-flash');
            setTimeout(() => document.getElementById('main-body').classList.remove('error-flash'), 800);
        }
    }

    function openShop(idx) {
        const shop = shops[idx];
        document.getElementById('shop-ui').style.display = 'block';
        document.getElementById('shop-name').innerText = shop.name;
        const container = document.getElementById('shop-options');
        container.innerHTML = '';
        shop.items.forEach(item => {
            let btn = document.createElement('button');
            btn.style.width = "95%"; btn.style.margin = "10px";
            btn.innerText = `${item.n} ($${item.p})`;
            btn.onclick = () => {
                if(players[turn].money >= item.p) {
                    players[turn].money -= item.p;
                    players[turn].pos = idx;
                    players[turn].items.add(idx);
                    document.getElementById('shop-ui').style.display = 'none';
                    updateBoard();
                    if(players[turn].items.size === 8) { alert(players[turn].avatar + " COMPLETED THE QUEST!"); location.reload(); }
                    nextTurn();
                } else { alert("Too expensive!"); }
            };
            container.appendChild(btn);
        });
    }

    function payFee() {
        players[turn].money -= 50;
        players[turn].pos = targetPos;
        document.getElementById('quest-ui').style.display = 'none';
        updateBoard();
        nextTurn();
    }

    function nextTurn() {
        turn = (turn + 1) % 3;
        rollVal = 0;
        document.getElementById('rollBtn').disabled = false;
        updateTurnUI();
    }

    function updateTurnUI() {
        for(let i=0; i<3; i++) {
            document.getElementById(`box-${i}`).className = (i === turn) ? 'player-box current-turn' : 'player-box';
            document.getElementById(`p${i}-icon`).innerText = players[i].avatar;
        }
        document.getElementById('msg').innerText = `P${turn+1}'s Turn (${players[turn].avatar})`;
    }

    function updateBoard() {
        document.querySelectorAll('.p-marker').forEach(m => m.remove());
        players.forEach((p, i) => {
            let s = document.createElement('span');
            s.className = 'p-marker';
            s.innerText = p.avatar;
            s.style.left = (i * 15) + "px";
            document.getElementById('s' + p.pos).appendChild(s);
            document.getElementById(`p${i}-m`).innerText = p.money;
            document.getElementById(`p${i}-c`).innerText = p.items.size;
        });
    }
</script>
</body>
</html>
