<!DOCTYPE html>
<html>
<head>
    <title>Grade 5 Adventure</title>
    <style>
        body { font-family: 'Arial Rounded MT Bold', sans-serif; background: #55efc4; padding: 20px; }
        #status-bar { background: white; padding: 15px; border-radius: 50px; display: flex; justify-content: space-around; margin-bottom: 20px; border: 4px solid #00b894; font-size: 20px; }
        
        .board { 
            display: grid; grid-template-columns: repeat(4, 1fr); grid-template-rows: repeat(4, 1fr); 
            width: 400px; height: 400px; margin: auto; background: #dfe6e9; border: 6px solid #2d3436;
        }
        
        .square { 
            background: white; border: 1px solid #636e72; display: flex; flex-direction: column; 
            justify-content: center; align-items: center; font-size: 12px; position: relative;
        }

        .middle { grid-column: 2 / 4; grid-row: 2 / 4; display: flex; flex-direction: column; justify-content: center; align-items: center; background: #fab1a0; }
        
        .active { background: #fdffb6 !important; border: 4px solid #ff9f43; z-index: 5; transform: scale(1.05); }
        
        button { padding: 15px 30px; font-size: 18px; border-radius: 30px; border: none; background: #0984e3; color: white; cursor: pointer; box-shadow: 0 5px #074b81; }
        button:active { transform: translateY(4px); box-shadow: 0 0; }

        #story-log { margin-top: 20px; background: #2d3436; color: #55efc4; padding: 15px; border-radius: 15px; height: 100px; overflow-y: auto; text-align: left; font-family: monospace; }
        .money-plus { color: #55efc4; font-weight: bold; }
        .money-minus { color: #ff7675; font-weight: bold; }
    </style>
</head>
<body>

<div id="status-bar">
    <span>💰 $<span id="money">500</span></span>
    <span>⭐ Score: <span id="score">0</span></span>
</div>

<div class="board">
    <div class="square" id="s0">🌳<br>Park</div>
    <div class="square" id="s1">📚<br>Library</div>
    <div class="square" id="s2">🏥<br>Hospital</div>
    <div class="square" id="s3">🛒<br>Market</div>
    
    <div class="square" id="s7">🦁<br>Zoo</div>
    <div class="middle">
        <div id="dice-ui" style="font-size: 50px;">🎲</div>
        <button onclick="play()">ROLL!</button>
    </div>
    <div class="square" id="s4">📖<br>Books</div>
    
    <div class="square" id="s6">📮<br>Post</div>
    <div class="square" id="s5">🧋<br>Tea</div>
    <div class="square" style="background:#b2bec3">GO</div>
    <div class="square" style="background:#b2bec3">FREE</div>
</div>

<div id="story-log">> Welcome, Teacher Mariel! Roll to start the day.</div>

<script>
    let money = 500;
    let score = 0;
    let pos = -1;
    const log = document.getElementById('story-log');

    const events = [
        { name: "Park", msg: "You found a lost wallet! +$50", cash: 50, pts: 10 },
        { name: "Library", msg: "Late fees! Pay $20.", cash: -20, pts: 5 },
        { name: "Hospital", msg: "Vitamin boost! Feel great. -$40", cash: -40, pts: 20 },
        { name: "Supermarket", msg: "Ice cream sale! Buy some. -$10", cash: -10, pts: 5 },
        { name: "Bookstore", msg: "Sold a used book! +$30", cash: 30, pts: 15 },
        { name: "Tea Shop", msg: "Bought Pearl Milk Tea! -$60", cash: -60, pts: 10 },
        { name: "Post Office", msg: "Sent a gift to Mariza! -$30", cash: -30, pts: 25 },
        { name: "Zoo", msg: "The monkeys stole your hat! -$15", cash: -15, pts: 5 }
    ];

    function play() {
        if(pos !== -1) document.getElementById('s'+pos).classList.remove('active');
        
        const roll = Math.floor(Math.random() * 6) + 1;
        document.getElementById('dice-ui').innerText = roll;
        pos = (pos + roll) % 8;
        
        document.getElementById('s'+pos).classList.add('active');
        
        const event = events[pos];
        money += event.cash;
        score += event.pts;
        
        // Update Screen
        document.getElementById('money').innerText = money;
        document.getElementById('score').innerText = score;
        
        const style = event.cash >= 0 ? "money-plus" : "money-minus";
        log.innerHTML = `<span class="${style}">[${event.name}] ${event.msg}</span><br>` + log.innerHTML;
        
        if(money <= 0) {
            alert("Game Over! You ran out of money. Restarting...");
            location.reload();
        }
    }
</script>

</body>
</html>
